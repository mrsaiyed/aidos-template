name: Build & publish devcontainer image

# Triggers only on changes that actually affect image contents. Edits to
# devcontainer.json, README, etc. won't rebuild — saving CI minutes.
on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/Dockerfile'
      - '.github/workflows/build-devcontainer-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hackathon-template-env

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR rejects uppercase chars in image paths, but github.repository_owner
      # preserves casing (e.g. "ZainRizvi"). Lowercase here so the workflow
      # works for any fork without further edits.
      - name: Compute lowercase image name
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          # Codespaces only run amd64 today; revisit if Microsoft adds arm64.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.sha }}
          # Registry-backed buildkit cache. mode=max exports intermediate
          # layers, so cache hits cover most of the Dockerfile across rebuilds.
          # A missing buildcache tag is logged as a warning, not an error.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:buildcache,mode=max
