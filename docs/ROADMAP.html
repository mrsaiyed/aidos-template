<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Highlight MVP — Phase Roadmap</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; margin: 0; padding: 0; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f3;
      --color-background-success: #eaf3de;
      --color-background-warning: #faeeda;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-text-success: #3b6d11;
      --color-text-warning: #854f0b;
      --color-text-info: #185fa5;
      --color-border-tertiary: rgba(0,0,0,0.15);
      --color-border-secondary: rgba(0,0,0,0.3);
      --color-border-primary: rgba(0,0,0,0.4);
      --color-border-info: #185fa5;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e0dfd8; }
      :root {
        --color-background-primary: #222220;
        --color-background-secondary: #2c2c2a;
        --color-background-success: #173404;
        --color-background-warning: #412402;
        --color-text-primary: #e0dfd8;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-text-success: #c0dd97;
        --color-text-warning: #fac775;
        --color-text-info: #85b7eb;
        --color-border-tertiary: rgba(255,255,255,0.12);
        --color-border-secondary: rgba(255,255,255,0.25);
        --color-border-primary: rgba(255,255,255,0.35);
        --color-border-info: #85b7eb;
      }
    }
    * { box-sizing: border-box; }
    .sr-only { position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0); }
    .track-wrap { overflow-x: auto; padding: 2rem 1.5rem 1.5rem; cursor: grab; user-select: none; }
    .track-wrap:active { cursor: grabbing; }
    .track { display: flex; gap: 20px; width: max-content; align-items: flex-start; }
    .phase-card {
      width: 148px; flex-shrink: 0; border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--color-border-tertiary);
      background: var(--color-background-primary);
      padding: 14px 14px 12px; cursor: pointer; transition: border-color .18s, transform .15s;
    }
    .phase-card:hover { border-color: var(--color-border-primary); transform: translateY(-2px); }
    .phase-card.active { border-color: var(--color-border-info) !important; border-width: 1.5px; }
    .phase-num { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; margin-bottom: 6px; letter-spacing: .04em; }
    .phase-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.35; margin-bottom: 10px; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500;
    }
    .s-done { background: var(--color-background-success); color: var(--color-text-success); }
    .s-progress { background: var(--color-background-warning); color: var(--color-text-warning); }
    .s-pending { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
    .connector { width: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 40px; }
    .connector-line { width: 100%; height: 1px; background: var(--color-border-secondary); position: relative; }
    .connector-line::after { content:''; position:absolute; right:-4px; top:-3px; width:0; height:0; border-top:3.5px solid transparent; border-bottom:3.5px solid transparent; border-left:5px solid var(--color-border-secondary); }
    .detail-panel {
      margin: 0 1.5rem 1.5rem;
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--color-border-tertiary);
      background: var(--color-background-secondary);
      overflow: hidden; transition: max-height .3s ease, opacity .3s ease;
      max-height: 0; opacity: 0; pointer-events: none;
    }
    .detail-panel.open { max-height: 600px; opacity: 1; pointer-events: auto; }
    .detail-inner { padding: 20px 24px 20px; }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .detail-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
    .detail-close { background: none; border: 0.5px solid var(--color-border-secondary); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; color: var(--color-text-secondary); font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .detail-section label { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; letter-spacing: .05em; display: block; margin-bottom: 6px; text-transform: uppercase; }
    .detail-section p { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin: 0; }
    .task-list { list-style: none; padding: 0; margin: 0; }
    .task-list li { font-size: 13px; color: var(--color-text-secondary); padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
    .task-list li .ti { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .ti-circle-check { color: var(--color-text-success); }
    .ti-circle-dashed { color: var(--color-text-warning); }
    .ti-circle { color: var(--color-text-tertiary); }
    .detail-criteria { margin-top: 16px; padding-top: 16px; border-top: 0.5px solid var(--color-border-tertiary); }
    .detail-criteria label { font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; letter-spacing: .05em; display: block; margin-bottom: 6px; text-transform: uppercase; }
    .detail-criteria p { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin: 0; }
    .scroll-hint { font-size: 12px; color: var(--color-text-tertiary); display: flex; align-items: center; gap: 6px; padding: 1.5rem 1.5rem 0; }
    h1 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); padding: 1.5rem 1.5rem 0; margin: 0 0 4px; }
    .subtitle { font-size: 13px; color: var(--color-text-tertiary); padding: 0 1.5rem 0; margin: 0 0 8px; }
  </style>
</head>
<body>

<h1>NBA Highlight MVP — Phase Roadmap</h1>
<p class="subtitle">Warriors vs Lakers · May 19 2021 · Game ID 0052000121</p>

<div class="scroll-hint">
  <i class="ti ti-arrow-left"></i>
  scroll to see all phases — click any to expand
  <i class="ti ti-arrow-right"></i>
</div>

<div class="track-wrap" id="track-wrap">
  <div class="track" id="track"></div>
</div>

<div class="detail-panel" id="detail-panel">
  <div class="detail-inner">
    <div class="detail-header">
      <div>
        <div class="detail-title" id="d-title"></div>
        <div id="d-status" style="margin-top:4px"></div>
      </div>
      <button class="detail-close" id="detail-close" aria-label="Close">
        <i class="ti ti-x"></i>
      </button>
    </div>
    <div class="detail-grid">
      <div class="detail-section">
        <label>Goal</label>
        <p id="d-goal"></p>
      </div>
      <div class="detail-section">
        <label>Outputs</label>
        <p id="d-outputs"></p>
      </div>
    </div>
    <div class="detail-section">
      <label>Tasks</label>
      <ul class="task-list" id="d-tasks"></ul>
    </div>
    <div class="detail-criteria">
      <label>Done when</label>
      <p id="d-criteria"></p>
    </div>
  </div>
</div>

<script>
const phases = [
  {
    num: 0, name: "Environment setup", status: "done",
    goal: "Confirm Codespaces is ready and scaffold the project structure.",
    outputs: "Folder structure, .gitignore, FastAPI skeleton, FFmpeg + yt-dlp confirmed, all docs created.",
    tasks: [
      { text: "Create folder structure" },
      { text: "Update .gitignore" },
      { text: "Install FFmpeg and yt-dlp" },
      { text: "Initialize Python venv with uv" },
      { text: "Create FastAPI skeleton with /health" },
      { text: "Create paths.py utility" },
      { text: "Create all documentation MDs" },
    ],
    criteria: "ffmpeg -version works, /health returns 200, no MP4s tracked by git."
  },
  {
    num: 1, name: "Backend + database + auth", status: "progress",
    goal: "Create the database, user accounts, login system, and game creation endpoints.",
    outputs: "SQLite tables (users, games), register/login/logout endpoints, game CRUD, video upload endpoint.",
    tasks: [
      { text: "SQLite + SQLAlchemy database setup" },
      { text: "User model and game model" },
      { text: "bcrypt password hashing" },
      { text: "JWT session token in httponly cookie" },
      { text: "Auth endpoints: register, login, logout, me" },
      { text: "Game endpoints: create, list, get, upload video" },
      { text: "Wire routers into main.py" },
      { text: "Confirm full auth flow end to end — deferred to Phase 7" },
    ],
    criteria: "Can register, log in, create a game, and upload an MP4. All stored in SQLite."
  },
  {
    num: 2, name: "NBA data + moments", status: "done",
    goal: "Fetch play-by-play for game 0052000121 and extract highlight moments.",
    outputs: "moments table rows for dunks, threes, blocks, steals, clutch plays. Mock fallback JSON.",
    tasks: [
      { text: "Connect to nba_api, fetch PlayByPlayV2" },
      { text: "Build mock fallback JSON for offline use" },
      { text: "Normalize raw play-by-play rows" },
      { text: "Filter for highlight-worthy event types" },
      { text: "Assign importance scores to each moment" },
      { text: "Store moment records in SQLite" },
    ],
    criteria: "Given game ID 0052000121, moments table is populated. Mock fallback works when API is down."
  },
  {
    num: 3, name: "Timeline mapping", status: "done",
    goal: "Convert NBA game clock + period into a video timestamp in seconds.",
    outputs: "video_time_seconds field populated on every moment record.",
    tasks: [
      { text: "Parse game clock string (MM:SS)" },
      { text: "Compute elapsed time per quarter (12:00 - clock)" },
      { text: "Add elapsed to quarter start timestamp" },
      { text: "Handle overtime periods" },
      { text: "Write validation tests with example moments" },
      { text: "Update all moments with video_time_seconds" },
    ],
    criteria: "Q1 10:30 maps to Q1 start + 90s. Q3 6:00 maps to Q3 start + 360s."
  },
  {
    num: 4, name: "FFmpeg clip cutting", status: "progress",
    goal: "Cut a 20-second video clip around each highlight moment.",
    outputs: "Individual MP4 clips per moment in player folders. Clip records in SQLite.",
    tasks: [
      { text: "Build FFmpeg wrapper in utils/ffmpeg.py" },
      { text: "Compute start = video_time - 8s, end = video_time + 12s" },
      { text: "Clamp start to 0 if negative" },
      { text: "Save clips to outputs/{game_id}/clips/{player}/" },
      { text: "Use sanitize_player_name from paths.py everywhere" },
      { text: "Create clip records in SQLite with file path and status" },
    ],
    criteria: "Every moment produces a playable MP4 clip. File paths stored in DB. Player folders created."
  },
  {
    num: 5, name: "Player video rendering", status: "pending",
    goal: "Concatenate each player's clips into one highlight video. Classify as Short or normal.",
    outputs: "One compiled MP4 per player. Duration measured. output_type set. rendered_videos table populated.",
    tasks: [
      { text: "Group clips by player name" },
      { text: "Build FFmpeg concat demuxer with temp file list" },
      { text: "Render one video per player to outputs/{id}/rendered/" },
      { text: "Measure final duration with ffprobe" },
      { text: "Classify: > 120s = video, <= 120s = short" },
      { text: "Create rendered_video records in SQLite" },
    ],
    criteria: "Each player has one compiled video. Duration and type stored in DB. Status = needs_review."
  },
  {
    num: 6, name: "Pipeline endpoint", status: "pending",
    goal: "One API endpoint kicks off the full pipeline as a background task. Frontend polls for status.",
    outputs: "POST /api/games/{id}/process endpoint. Game status updates through each stage. Error handling.",
    tasks: [
      { text: "Create POST /api/games/{id}/process endpoint" },
      { text: "Run pipeline as FastAPI BackgroundTask" },
      { text: "Update game.status at each pipeline stage" },
      { text: "Set status = failed with error message on any exception" },
      { text: "Frontend polls GET /api/games/{id} for live status" },
    ],
    criteria: "Single API call triggers full pipeline. Status visible in real time. Failures don't crash server."
  },
  {
    num: 7, name: "Frontend review UI", status: "pending",
    goal: "Next.js app where user logs in, sees games, and does rapid-fire approve/reject of player videos.",
    outputs: "Login page, game dashboard, review page with video preview and approve/reject flow.",
    tasks: [
      { text: "Create Next.js app in frontend/" },
      { text: "Login page with email and password" },
      { text: "Game dashboard with status and process button" },
      { text: "Review page: one player at a time, video plays" },
      { text: "Approve and reject buttons with progress counter" },
      { text: "Summary screen after all players reviewed" },
      { text: "Video src from /outputs static files on FastAPI" },
    ],
    criteria: "User can log in, process a game, watch videos, approve or reject each. Approved files saved."
  },
  {
    num: 8, name: "Auto quarter detection", status: "pending",
    goal: "Automatically detect quarter start timestamps from the video using OCR.",
    outputs: "quarter_detector.py service. Q1-Q4 timestamps auto-populated. Manual override still available.",
    tasks: [
      { text: "Sample frames every 30s with FFmpeg" },
      { text: "Run Tesseract OCR on scoreboard region" },
      { text: "Detect Q1/Q2/Q3/Q4 + 12:00 clock pattern" },
      { text: "Store detected timestamps in game record" },
      { text: "Frontend shows detected values with manual override" },
    ],
    criteria: "System finds quarter starts within 5 seconds without manual input. Manual entry still works."
  },
  {
    num: 9, name: "Demo polish", status: "pending",
    goal: "Make the full end-to-end demo presentable to hackathon judges.",
    outputs: "Clear README, demo script, seed data, error handling, UI cleanup.",
    tasks: [
      { text: "Write demo script for judges" },
      { text: "Seed command to load mock game quickly" },
      { text: "Add error messages to frontend for failed states" },
      { text: "UI cleanup and consistent styling" },
      { text: "Update all documentation MDs" },
      { text: "Final README with setup and run instructions" },
    ],
    criteria: "A judge can follow input to processing to output to review in under 5 minutes."
  },
];

const statusConfig = {
  done:     { label: "Complete",    cls: "s-done",     icon: "ti-circle-check" },
  progress: { label: "In progress", cls: "s-progress", icon: "ti-circle-dashed" },
  pending:  { label: "Not started", cls: "s-pending",  icon: "ti-circle" },
};

const track = document.getElementById('track');
let activeIdx = null;

phases.forEach((p, i) => {
  if (i > 0) {
    const conn = document.createElement('div');
    conn.className = 'connector';
    conn.innerHTML = '<div class="connector-line"></div>';
    track.appendChild(conn);
  }
  const sc = statusConfig[p.status];
  const card = document.createElement('div');
  card.className = 'phase-card';
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');
  card.innerHTML = `
    <div class="phase-num">Phase ${p.num}</div>
    <div class="phase-name">${p.name}</div>
    <span class="status-pill ${sc.cls}">
      <i class="ti ${sc.icon}"></i> ${sc.label}
    </span>`;
  card.addEventListener('click', () => toggleDetail(i, card));
  card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleDetail(i, card); }
  });
  track.appendChild(card);
});

const panel = document.getElementById('detail-panel');

function toggleDetail(idx, card) {
  const allCards = document.querySelectorAll('.phase-card');
  if (activeIdx === idx) {
    panel.classList.remove('open');
    card.classList.remove('active');
    activeIdx = null;
    return;
  }
  allCards.forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  activeIdx = idx;
  renderDetail(phases[idx]);
  panel.classList.add('open');
}

function renderDetail(p) {
  const sc = statusConfig[p.status];
  document.getElementById('d-title').textContent = `Phase ${p.num}: ${p.name}`;
  document.getElementById('d-status').innerHTML =
    `<span class="status-pill ${sc.cls}"><i class="ti ${sc.icon}"></i> ${sc.label}</span>`;
  document.getElementById('d-goal').textContent = p.goal;
  document.getElementById('d-outputs').textContent = p.outputs;
  document.getElementById('d-criteria').textContent = p.criteria;
  const ul = document.getElementById('d-tasks');
  ul.innerHTML = '';
  const iconCls = p.status === 'done' ? 'ti-circle-check' : p.status === 'progress' ? 'ti-circle-dashed' : 'ti-circle';
  p.tasks.forEach(t => {
    const li = document.createElement('li');
    li.innerHTML = `<i class="ti ${iconCls}"></i><span>${t.text}</span>`;
    ul.appendChild(li);
  });
}

document.getElementById('detail-close').addEventListener('click', () => {
  panel.classList.remove('open');
  document.querySelectorAll('.phase-card').forEach(c => c.classList.remove('active'));
  activeIdx = null;
});

const wrap = document.getElementById('track-wrap');
let isDown = false, startX, scrollLeft;
wrap.addEventListener('mousedown', e => { isDown = true; startX = e.pageX - wrap.offsetLeft; scrollLeft = wrap.scrollLeft; });
wrap.addEventListener('mouseleave', () => isDown = false);
wrap.addEventListener('mouseup', () => isDown = false);
wrap.addEventListener('mousemove', e => {
  if (!isDown) return;
  e.preventDefault();
  wrap.scrollLeft = scrollLeft - (e.pageX - wrap.offsetLeft - startX);
});
</script>
</body>
</html>
